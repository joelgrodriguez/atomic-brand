<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap');
  body { font-family: 'Roboto Mono', monospace; margin: 40px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 32px; color: #6B6B70; }
  .row { display: flex; gap: 24px; margin: 16px 0; align-items: center; }
  .badge { width: 88px; height: 88px; }
  .dark-bg { background: #0D0D0D; padding: 20px; display: flex; gap: 24px; border-radius: 0; }
  .light-bg { background: #FAFBFB; padding: 20px; display: flex; gap: 24px; border: 1px solid #E5E5E5; }
  .label { font-size: 11px; color: #8E8E93; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<h1 style="font-size:18px; color:#0D0D0D;">Quadrant Badge Preview</h1>

<h2>Color Variants (on Steel gray)</h2>
<div style="background: #8E8E93; padding: 20px; display: flex; gap: 24px;">
  <div><img src="aa-badge-ta-color.svg" class="badge"><div class="label" style="color:#E5E5E5;">Ta // Tactical</div></div>
  <div><img src="aa-badge-du-color.svg" class="badge"><div class="label" style="color:#E5E5E5;">Du // Duty</div></div>
  <div><img src="aa-badge-hu-color.svg" class="badge"><div class="label" style="color:#E5E5E5;">Hu // Hunting</div></div>
  <div><img src="aa-badge-ma-color.svg" class="badge"><div class="label" style="color:#E5E5E5;">Ma // Match</div></div>
</div>

<h2>White Variants (on dark background)</h2>
<div class="dark-bg">
  <div><img src="aa-badge-ta-wht.svg" class="badge"></div>
  <div><img src="aa-badge-du-wht.svg" class="badge"></div>
  <div><img src="aa-badge-hu-wht.svg" class="badge"></div>
  <div><img src="aa-badge-ma-wht.svg" class="badge"></div>
</div>

<h2>Black Variants (on light background)</h2>
<div class="light-bg">
  <div><img src="aa-badge-ta-blk.svg" class="badge"></div>
  <div><img src="aa-badge-du-blk.svg" class="badge"></div>
  <div><img src="aa-badge-hu-blk.svg" class="badge"></div>
  <div><img src="aa-badge-ma-blk.svg" class="badge"></div>
</div>

</body>
</html>
